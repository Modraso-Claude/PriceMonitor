name: Мониторинг цен Wildberries

on:
  schedule:
    # Каждый день в 07:00 по Москве (04:00 UTC)
    - cron: "0 4 * * *"
  workflow_dispatch: {}   # позволяет запустить вручную кнопкой в GitHub

permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python price_monitor.py

      - name: Commit updated price history
        run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "Обновление истории цен $(date +%F)"
          git push
